<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Zhushen logo</title>
  <desc id="desc">简洁现代的主神品牌标识，由六边形外框、中心核心与向上延展的 ZS 几何结构组成。</desc>
  <defs>
    <linearGradient id="zs-gradient" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D5EF9"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="zs-core" x1="196" y1="188" x2="316" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#DCEBFF" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="zs-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#312E81" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#F8FBFF"/>

  <g filter="url(#zs-shadow)">
    <path d="M256 72 399 154.5V319.5L256 402 113 319.5V154.5L256 72Z" fill="url(#zs-gradient)"/>
    <path d="M256 118 359 177.5V296.5L256 356 153 296.5V177.5L256 118Z" fill="#0F172A" fill-opacity="0.14"/>
    <path d="M256 134 345 185.5V288.5L256 340 167 288.5V185.5L256 134Z" fill="#FFFFFF" fill-opacity="0.12"/>
    <path d="M256 162 320 199V273L256 310 192 273V199L256 162Z" fill="url(#zs-core)"/>
  </g>

  <path d="M172 182H330L230 268H334L182 368H282L192 430" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256 118V392" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="18" fill="#1D4ED8" fill-opacity="0.22"/>
</svg>
