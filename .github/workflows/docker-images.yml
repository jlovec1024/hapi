name: Docker Images

on:
  pull_request:
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'

permissions:
  contents: read

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
          - name: runner
            dockerfile: Dockerfile.runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
            image: ghcr.io/${{ github.repository_owner }}/zs-hub
          - name: runner
            dockerfile: Dockerfile.runner
            image: ghcr.io/${{ github.repository_owner }}/zs-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
