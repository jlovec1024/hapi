name: Docker Images

on:
  pull_request:
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'

permissions:
  contents: read

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
          - name: runner
            dockerfile: Dockerfile.runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false

  compose-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: zs-smoke
      ZS_HUB_IMAGE: zs-hub:candidate
      ZS_RUNNER_IMAGE: zs-runner:candidate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Build hub candidate image
        run: docker build -f Dockerfile.hub -t "$ZS_HUB_IMAGE" .

      - name: Build runner candidate image
        run: docker build -f Dockerfile.runner -t "$ZS_RUNNER_IMAGE" .

      - name: Runner smoke test
        run: |
          docker run --rm "$ZS_RUNNER_IMAGE" zs --help
          docker run --rm "$ZS_RUNNER_IMAGE" claude --version
          docker run --rm --entrypoint /bin/bash "$ZS_RUNNER_IMAGE" -lc 'bun run --cwd /app/cli src/index.ts --help >/tmp/zs-help.txt && tail -n 20 /tmp/zs-help.txt'

      - name: Create smoke env
        run: |
          cp .env.example .env
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.env')
          text = p.read_text()
          text = text.replace('CLI_API_TOKEN=change-me', 'CLI_API_TOKEN=smoke-test-token')
          text = text.replace('CLAUDE_CONFIG_DIR=/absolute/path/to/your/.claude', f'CLAUDE_CONFIG_DIR={Path.cwd() / ".claude"}')
          p.write_text(text)
          PY
          mkdir -p .claude

      - name: Validate env
        run: bun run docker:check

      - name: Compose smoke test
        run: |
          docker compose up -d --no-build zs-hub zs-runner
          hub_container="${COMPOSE_PROJECT_NAME}-zs-hub-1"
          runner_container="${COMPOSE_PROJECT_NAME}-zs-runner-1"
          for i in $(seq 1 30); do
            hub_status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$hub_container")
            runner_status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$runner_container")
            if [ "$hub_status" = 'healthy' ] && [ "$runner_status" = 'healthy' ]; then
              break
            fi
            sleep 2
          done
          docker compose ps
          docker inspect --format='hub={{.State.Health.Status}}' "$hub_container"
          docker inspect --format='runner={{.State.Health.Status}} restart_count={{.RestartCount}} restarting={{.State.Restarting}} exit_code={{.State.ExitCode}}' "$runner_container"
          docker compose logs --no-color --tail=120 zs-hub zs-runner
          test "$(docker inspect --format='{{.State.Health.Status}}' "$hub_container")" = 'healthy'
          test "$(docker inspect --format='{{.State.Health.Status}}' "$runner_container")" = 'healthy'
          test "$(docker inspect --format='{{.RestartCount}}' "$runner_container")" = '0'
          test "$(docker inspect --format='{{.State.Restarting}}' "$runner_container")" = 'false'

      - name: Teardown compose stack
        if: always()
        run: docker compose down -v

  publish-runner:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compose-smoke
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zs-runner
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-hub-arch:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compose-smoke
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zs-hub
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Prepare arch tags
        id: arch-tags
        env:
          BASE_TAGS: ${{ steps.meta.outputs.tags }}
          ARCH_SUFFIX: ${{ matrix.arch }}
        run: |
          printf 'tags<<EOF\n' >> "$GITHUB_OUTPUT"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            printf '%s\n' "${tag}-${ARCH_SUFFIX}" >> "$GITHUB_OUTPUT"
          done <<< "$BASE_TAGS"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Build and push hub (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.arch-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-hub-manifest:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: publish-hub-arch
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zs-hub
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Merge hub multi-arch manifest
        env:
          BASE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
            docker buildx imagetools inspect "$tag"
          done <<< "$BASE_TAGS"
