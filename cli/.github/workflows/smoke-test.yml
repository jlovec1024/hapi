name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn build

    - name: Pack package
      run: yarn pack

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls *.tgz)
        npm install -g "$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # Test that the binary starts successfully
        echo "Testing zs --help..."
        timeout 30s zs --help || {
          echo "Error: zs --help failed or timed out"
          exit 1
        }

        echo "Testing zs --version..."
        timeout 10s zs --version || {
          echo "Error: zs --version failed or timed out"
          exit 1
        }

        echo "Testing zs doctor..."
        timeout 30s zs doctor || {
          echo "Error: zs doctor failed or timed out"
          exit 1
        }

        echo "Testing zs runner status..."
        timeout 10s zs runner status || {
          echo "Error: zs runner status failed or timed out"
          exit 1
        }

        echo "✅ Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn build

    - name: Pack package
      run: yarn pack

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (*.tgz) do npm install -g "%%f"

    - name: Debug npm global installation structure
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Listing npm prefix directory:
        dir "%NPM_PREFIX%" 2>nul || echo Failed to list NPM_PREFIX
        echo.
        echo Checking for node_modules in npm prefix:
        if exist "%NPM_PREFIX%\node_modules" (
          echo Found node_modules directory
          dir "%NPM_PREFIX%\node_modules" 2>nul
          echo.
          echo Checking for @jlovec package scope:
          if exist "%NPM_PREFIX%\node_modules\@jlovec" (
            echo Found @jlovec scope
            dir "%NPM_PREFIX%\node_modules\@jlovec" 2>nul
            echo.
            echo Checking for @jlovec\zhushen package:
            if exist "%NPM_PREFIX%\node_modules\@jlovec\zhushen" (
              echo Found @jlovec\zhushen package
              dir "%NPM_PREFIX%\node_modules\@jlovec\zhushen" 2>nul
            ) else (
              echo No @jlovec\zhushen package found
            )
          ) else (
            echo No @jlovec scope found
          )
        ) else (
          echo No node_modules directory found
        )

    - name: Test binary execution
      shell: cmd
      run: |
        @echo on

        rem Get npm global prefix and add to PATH
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Current PATH: %PATH%

        rem Debug: Check if zs exists in various locations
        echo Checking for zs binary...
        where zs 2>nul && echo Found zs in PATH || echo zs not found in PATH
        if exist "%NPM_PREFIX%\zs.cmd" echo Found zs.cmd in NPM_PREFIX
        if exist "%NPM_PREFIX%\node_modules\.bin\zs.cmd" echo Found zs.cmd in .bin directory
        dir "%NPM_PREFIX%\*zs*" 2>nul || echo No zs files found in NPM_PREFIX

        rem Debug: Check the actual contents and encoding of the installed file
        if exist "%NPM_PREFIX%\zs.cmd" (
          echo File size and type:
          dir "%NPM_PREFIX%\zs.cmd"
          echo.
          echo First few lines of the file:
          type "%NPM_PREFIX%\zs.cmd" | head -5
          echo.
          echo Hex dump of first 50 bytes to check line endings:
          powershell -Command "Get-Content '%NPM_PREFIX%\zs.cmd' -Encoding Byte -TotalCount 50 | ForEach-Object { '{0:X2}' -f $_ } | Join-String -Separator ' '"
          echo.
          echo Testing with direct path...
          "%NPM_PREFIX%\zs.cmd" --help
        ) else (
          echo Testing zs --help...
          zs --help
        )
        if errorlevel 1 (
          echo Error: zs --help failed
          exit /b 1
        )

        rem Test version
        if exist "%NPM_PREFIX%\zs.cmd" (
          "%NPM_PREFIX%\zs.cmd" --version
        ) else (
          zs --version
        )
        if errorlevel 1 (
          echo Error: zs --version failed
          exit /b 1
        )

        rem Test doctor
        echo Testing zs doctor...
        if exist "%NPM_PREFIX%\zs.cmd" (
          "%NPM_PREFIX%\zs.cmd" doctor
        ) else (
          zs doctor
        )
        if errorlevel 1 (
          echo Error: zs doctor failed
          exit /b 1
        )

        rem Test runner status
        echo Testing zs runner status...
        if exist "%NPM_PREFIX%\zs.cmd" (
          "%NPM_PREFIX%\zs.cmd" runner status
        ) else (
          zs runner status
        )
        if errorlevel 1 (
          echo Error: zs runner status failed
          exit /b 1
        )

        echo ✅ Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
