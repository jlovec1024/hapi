services:
  zs-hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    image: zs-hub:local
    environment:
      ZS_LISTEN_PORT: 80
      ZS_PUBLIC_URL: http://localhost:18080
      CLI_API_TOKEN: zhushen
    ports:
      - 18080:80
    volumes:
      - hub-data:/data/hub
    restart: unless-stopped

  zs-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: zs-runner:local
    environment:
      CLI_API_TOKEN: zhushen
      ZS_API_URL: http://zs-hub:80
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
    volumes:
      - runner-data:/data/runner
      - goenv-data:/data/goenv
      - nvm-data:/data/nvm
      - claude-data:/data/claude
    depends_on:
      - zs-hub
    restart: unless-stopped

volumes:
  hub-data:
  runner-data:
  goenv-data:
  nvm-data:
  claude-data:
