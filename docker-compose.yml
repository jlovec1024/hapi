services:
  zs-hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    image: ${ZS_HUB_IMAGE:-zs-hub:local}
    environment:
      ZS_PUBLIC_URL: ${ZS_PUBLIC_URL:-http://localhost:80}
      CLI_API_TOKEN: ${CLI_API_TOKEN}
    ports:
      - "${ZS_LISTEN_PORT:-80}:80"
    volumes:
      - hub-data:/root/.zhushen
    restart: unless-stopped

  zs-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: ${ZS_RUNNER_IMAGE:-zs-runner:local}
    environment:
      CLI_API_TOKEN: ${CLI_API_TOKEN}
      ZS_GO_VERSION: ${ZS_GO_VERSION:-1.24.3}
      ZS_NODE_VERSION: ${ZS_NODE_VERSION:-22}
      ZS_GIT_USER_NAME: "${ZS_GIT_USER_NAME:-zs runner}"
      ZS_GIT_USER_EMAIL: "${ZS_GIT_USER_EMAIL:-zs-runner@local}"
      # ZCF 运行时覆盖：ZCF_API_KEY 必须是 token，ZCF_API_URL 必须是 http(s) URL
      ZCF_API_KEY: ${ZCF_API_KEY:-}
      ZCF_API_URL: ${ZCF_API_URL:-}
      ZCF_API_MODEL: ${ZCF_API_MODEL:-}
      ZCF_API_HAIKU_MODEL: ${ZCF_API_HAIKU_MODEL:-}
      ZCF_API_SONNET_MODEL: ${ZCF_API_SONNET_MODEL:-}
      ZCF_API_OPUS_MODEL: ${ZCF_API_OPUS_MODEL:-}
      ZCF_DEFAULT_OUTPUT_STYLE: ${ZCF_DEFAULT_OUTPUT_STYLE:-}
      ZCF_ALL_LANG: ${ZCF_ALL_LANG:-}
      ZCF_AI_OUTPUT_LANG: ${ZCF_AI_OUTPUT_LANG:-}
    volumes:
      - runner-data:/data
      - ${CLAUDE_CONFIG_DIR:?CLAUDE_CONFIG_DIR must be set}:/root/.claude
    depends_on:
      - zs-hub
    restart: unless-stopped

volumes:
  hub-data:
  runner-data:
